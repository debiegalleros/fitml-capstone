name: CI

on:
  push:
    branches: [main, vision-tryon]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint (ruff)
        run: ruff check backend src tests

      - name: Unit tests (offline — mask geometry, pose adapter, fit context)
        run: pytest tests/test_unit.py -v
